
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="태양광 자격증">
  <meta name="theme-color" content="#1a1a18">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>태양광 자격증</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeece6;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px;
      --info-bg:#e6f1fb; --info-text:#0c447c;
      --success-bg:#eaf3de; --success-text:#27500a;
      --warning-bg:#faeeda; --warning-text:#633806;
      --danger-bg:#fcebeb; --danger-text:#791f1f;
      --warning-border:rgba(186,117,23,0.35);
      --success-border:rgba(99,153,34,0.35);
      --danger-border:rgba(226,75,74,0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2c;
        --text:#f0ede6; --text2:#a0a09a; --text3:#686864;
        --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
        --info-bg:#042c53; --info-text:#b5d4f4;
        --success-bg:#173404; --success-text:#c0dd97;
        --warning-bg:#412402; --warning-text:#fac775;
        --danger-bg:#501313; --danger-text:#f7c1c1;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; min-height: 100dvh; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    .app { max-width: 640px; margin: 0 auto; background: var(--bg); min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
    .header { padding: calc(var(--safe-top) + 14px) 20px 0; background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .header-title { font-size: 12px; color: var(--text2); }
    .sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .sync-dot.synced { background: #3b6d11; }
    .sync-dot.syncing { background: #854f0b; animation: pulse 1s infinite; }
    .sync-dot.error { background: #a32d2d; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .tab-bar { display:flex; border-bottom:0.5px solid var(--border); margin-top:10px; }
    .tab { flex:1; padding:10px 4px; font-size:13px; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-0.5px; font-family:inherit; }
    .tab.active { color:var(--text); border-bottom:2px solid var(--text); font-weight:500; }
    .content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .screen { display:none; padding:20px 20px calc(var(--safe-bottom) + 20px); }
    .screen.active { display:block; }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .stat-card { background:var(--bg2); border-radius:var(--radius-md); padding:14px 10px; text-align:center; }
    .stat-label { font-size:11px; color:var(--text2); margin-bottom:4px; }
    .stat-num { font-size:22px; font-weight:500; }
    .section-title { font-size:11px; font-weight:500; color:var(--text2); margin-bottom:10px; letter-spacing:0.3px; }
    .mode-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:8px; }
    .mode-card { padding:14px; border:0.5px solid var(--border2); border-radius:var(--radius-lg); background:var(--bg); cursor:pointer; }
    .mode-card.active { border:1.5px solid var(--text); background:var(--bg2); }
    .mode-card.wide { display:flex; align-items:center; gap:10px; padding:12px 14px; }
    .mode-icon { font-size:18px; margin-bottom:6px; }
    .mode-card.wide .mode-icon { margin-bottom:0; font-size:16px; }
    .mode-card-title { font-size:14px; font-weight:500; }
    .mode-card-desc { font-size:11px; color:var(--text2); margin-top:2px; line-height:1.4; }
    .start-btn { width:100%; padding:15px; font-size:15px; font-weight:500; font-family:inherit; background:var(--text); color:var(--bg); border:none; border-radius:var(--radius-lg); cursor:pointer; margin:12px 0; }
    .mode-row { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .progress { height:3px; background:var(--bg2); overflow:hidden; margin-bottom:20px; }
    .progress-fill { height:100%; background:var(--text); transition:width 0.3s; }
    .q-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
    .q-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .badge { font-size:11px; padding:3px 10px; border-radius:var(--radius-md); font-weight:500; }
    .badge-short { background:var(--info-bg); color:var(--info-text); }
    .badge-essay { background:var(--success-bg); color:var(--success-text); }
    .badge-calc { background:var(--warning-bg); color:var(--warning-text); }
    .save-btn { font-size:12px; padding:4px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:none; cursor:pointer; color:var(--text2); font-family:inherit; }
    .save-btn.saved { background:var(--warning-bg); color:var(--warning-text); border-color:var(--warning-border); }
    .q-text { font-size:15px; line-height:1.7; margin-bottom:16px; }
    .hint-box { background:var(--bg2); border-radius:var(--radius-md); padding:10px 14px; font-size:13px; color:var(--text2); margin-bottom:12px; line-height:1.5; border-left:3px solid var(--border2); }
    .unit-hint { font-size:12px; color:var(--text2); margin-bottom:6px; }
    input[type="text"], textarea { width:100%; padding:11px 14px; border:0.5px solid var(--border2); border-radius:var(--radius-md); font-size:16px; font-family:inherit; background:var(--bg); color:var(--text); margin-bottom:10px; -webkit-appearance:none; appearance:none; }
    textarea { resize:vertical; min-height:100px; font-size:15px; }
    input:focus, textarea:focus { outline:none; border-color:var(--text); }
    input:disabled, textarea:disabled { opacity:0.6; }
    .confirm-btn { padding:11px 22px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); cursor:pointer; font-size:14px; font-family:inherit; color:var(--text); }
    .feedback { font-size:13px; padding:12px 14px; border-radius:var(--radius-md); margin-top:12px; line-height:1.6; }
    .feedback.correct { background:var(--success-bg); color:var(--success-text); }
    .feedback.wrong { background:var(--danger-bg); color:var(--danger-text); }
    .feedback.essay-reveal { background:var(--bg2); color:var(--text); border:0.5px solid var(--border); }
    .self-btns { display:flex; gap:8px; margin-top:10px; }
    .self-btn { flex:1; padding:11px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:var(--bg); cursor:pointer; font-size:14px; font-family:inherit; color:var(--text); }
    .self-btn.ok { background:var(--success-bg); color:var(--success-text); border-color:var(--success-border); }
    .self-btn.fail { background:var(--danger-bg); color:var(--danger-text); border-color:var(--danger-border); }
    .nav-row { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
    .nav-btn { padding:10px 20px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); cursor:pointer; font-size:14px; font-family:inherit; color:var(--text); }
    .nav-btn.primary { background:var(--text); color:var(--bg); border-color:var(--text); }
    .q-counter { font-size:13px; color:var(--text2); }
    .add-form { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
    .form-label { font-size:13px; color:var(--text2); margin-bottom:6px; display:block; }
    select { width:100%; padding:10px 12px; border:0.5px solid var(--border2); border-radius:var(--radius-md); font-size:15px; font-family:inherit; background:var(--bg); color:var(--text); margin-bottom:14px; -webkit-appearance:none; appearance:none; }
    .add-btn { padding:11px 24px; border:none; border-radius:var(--radius-md); background:var(--text); color:var(--bg); cursor:pointer; font-size:14px; font-family:inherit; }
    .filter-row { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-btn { padding:5px 12px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); cursor:pointer; font-size:12px; font-family:inherit; color:var(--text2); }
    .filter-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .q-list-item { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .q-list-item.bookmarked { border-color:var(--warning-border); background:var(--warning-bg); }
    .q-list-text { font-size:14px; flex:1; line-height:1.5; }
    .q-list-sub { font-size:11px; color:var(--text2); margin-top:4px; }
    .q-list-actions { display:flex; gap:6px; flex-shrink:0; }
    .bk-btn, .del-btn { font-size:12px; padding:4px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:none; cursor:pointer; color:var(--text2); font-family:inherit; }
    .bk-btn.on { background:var(--warning-bg); color:var(--warning-text); border-color:var(--warning-border); }
    .empty { text-align:center; padding:40px 20px; color:var(--text2); font-size:14px; line-height:1.8; }
    .loading { text-align:center; padding:40px 20px; color:var(--text2); font-size:14px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">신재생에너지발전설비기사 (태양광)</div>
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">연결 중...</span></div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('home')">홈</button>
      <button class="tab" onclick="switchTab('quiz')">문제 풀기</button>
      <button class="tab" onclick="switchTab('manage')">문제 관리</button>
      <button class="tab" onclick="switchTab('saved')">저장함 ⭐</button>
    </div>
  </div>
  <div class="content">
    <div class="screen active" id="screen-home">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">전체 문제</div><div class="stat-num" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-label">오늘 푼 문제</div><div class="stat-num" id="stat-today">0</div></div>
        <div class="stat-card"><div class="stat-label">정답률</div><div class="stat-num" id="stat-rate">-</div></div>
      </div>
      <div class="section-title">학습 모드 선택</div>
      <div class="mode-grid">
        <div class="mode-card active" id="mode-all" onclick="setMode('all')"><div class="mode-icon">📚</div><div class="mode-card-title">전체</div><div class="mode-card-desc">모든 유형 섞어서 풀기</div></div>
        <div class="mode-card" id="mode-short" onclick="setMode('short')"><div class="mode-icon">✏️</div><div class="mode-card-title">단답형</div><div class="mode-card-desc">단어나 짧은 답 작성</div></div>
        <div class="mode-card" id="mode-essay" onclick="setMode('essay')"><div class="mode-icon">📝</div><div class="mode-card-title">서술형</div><div class="mode-card-desc">풀어서 설명하는 문제</div></div>
        <div class="mode-card" id="mode-calc" onclick="setMode('calc')"><div class="mode-icon">🔢</div><div class="mode-card-title">계산문제</div><div class="mode-card-desc">수식 계산해서 푸는 문제</div></div>
      </div>
      <button class="start-btn" onclick="startQuiz()">문제 풀기 시작</button>
      <div class="mode-row">
        <div class="mode-card wide" id="mode-wrong" onclick="setMode('wrong')"><div class="mode-icon">❌</div><div><div class="mode-card-title">오답노트</div><div class="mode-card-desc">틀렸던 문제만</div></div></div>
        <div class="mode-card wide" id="mode-bookmarked" onclick="setMode('bookmarked')"><div class="mode-icon">⭐</div><div><div class="mode-card-title">저장한 문제</div><div class="mode-card-desc">저장한 문제만</div></div></div>
      </div>
    </div>
    <div class="screen" id="screen-quiz">
      <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="quiz-area"></div>
      <div class="nav-row">
        <button class="nav-btn" onclick="switchTab('home')">그만하기</button>
        <span class="q-counter" id="q-counter"></span>
        <button class="nav-btn primary" id="next-btn" onclick="nextQuestion()" style="display:none">다음 문제</button>
      </div>
    </div>
    <div class="screen" id="screen-manage">
      <div class="add-form">
        <div class="section-title">새 문제 추가</div>
        <label class="form-label">문제 유형</label>
        <select id="q-type" onchange="toggleType()">
          <option value="short">단답형 — 단어/짧은 답</option>
          <option value="essay">서술형 — 풀어서 설명</option>
          <option value="calc">계산문제 — 수식 계산</option>
        </select>
        <label class="form-label">문제</label>
        <textarea id="q-question" placeholder="문제를 입력하세요"></textarea>
        <div id="hint-row" style="display:none"><label class="form-label">힌트 / 공식 (선택)</label><input type="text" id="q-hint" placeholder="예: P = V × I"></div>
        <div id="unit-row" style="display:none"><label class="form-label">정답 단위 (선택)</label><input type="text" id="q-unit" placeholder="예: kW, %, V, A"></div>
        <label class="form-label" id="ans-label">정답</label>
        <textarea id="q-answer" placeholder="정답을 입력하세요" style="min-height:60px"></textarea>
        <button class="add-btn" onclick="addQuestion()">추가</button>
      </div>
      <div class="section-title">등록된 문제 (<span id="q-count">0</span>개)</div>
      <div class="filter-row">
        <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">전체</button>
        <button class="filter-btn" id="filter-short" onclick="setFilter('short')">단답형</button>
        <button class="filter-btn" id="filter-essay" onclick="setFilter('essay')">서술형</button>
        <button class="filter-btn" id="filter-calc" onclick="setFilter('calc')">계산문제</button>
        <button class="filter-btn" id="filter-bookmarked" onclick="setFilter('bookmarked')">⭐ 저장</button>
      </div>
      <div id="q-list"><div class="loading">불러오는 중...</div></div>
    </div>
    <div class="screen" id="screen-saved">
      <div class="section-title">저장한 문제 (<span id="saved-count">0</span>개)</div>
      <div id="saved-list"></div>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBp9mpvt-nrn_SpV9njmxNBUsCK-235hmw",
  authDomain: "solar-quiz-48bc3.firebaseapp.com",
  projectId: "solar-quiz-48bc3",
  storageBucket: "solar-quiz-48bc3.firebasestorage.app",
  messagingSenderId: "729537376643",
  appId: "1:729537376643:web:a386ee3174147b47cd46b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

function setSyncStatus(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

let questions = [], quizQueue = [], quizIdx = 0, answered = false, mode = 'all';
let todayCount = 0, totalCorrect = 0, totalAnswered = 0, listFilter = 'all';

const sampleQuestions = [
  {type:'short',q:'태양전지의 최소 단위를 무엇이라 하는가?',answer:'셀',hint:'',unit:'',wrongCount:0,bookmarked:false},
  {type:'short',q:'여러 셀을 직렬·병렬로 연결해 만든 단위 묶음을 무엇이라 하는가?',answer:'모듈',hint:'',unit:'',wrongCount:0,bookmarked:false},
  {type:'essay',q:'태양광 발전 시스템에서 인버터의 역할을 설명하시오.',answer:'직류(DC)를 교류(AC)로 변환하는 장치로, 태양광 모듈에서 생산된 직류 전력을 가정용·계통용 교류 전력으로 바꿔준다.',hint:'',unit:'',wrongCount:0,bookmarked:false},
  {type:'essay',q:'계통연계형과 독립형 태양광 시스템의 차이점을 서술하시오.',answer:'계통연계형은 한전 전력망과 연결되어 잉여전력을 판매하고 부족 시 계통에서 공급받는다. 독립형은 계통와 분리되어 배터리 저장 전력만 사용하므로 오지·도서 지역에 적합하다.',hint:'',unit:'',wrongCount:0,bookmarked:false},
  {type:'calc',q:'태양광 모듈 1장의 출력이 400W이고 20장이 설치되어 있을 때, 총 설비 용량을 구하시오.',answer:'8',hint:'총 용량(kW) = 모듈 출력(W) × 수량 ÷ 1000',unit:'kW',wrongCount:0,bookmarked:false},
  {type:'calc',q:'일일 일사량 4 kWh/m², 시스템 효율 80%, 설비용량 10kW일 때 하루 발전량을 구하시오.',answer:'32',hint:'발전량 = 설비용량 × 일사량 × 효율',unit:'kWh',wrongCount:0,bookmarked:false},
];

setSyncStatus('syncing', '연결 중...');
signInAnonymously(auth).then(() => {
  setSyncStatus('synced', '동기화됨');
  const q = query(collection(db, 'questions'), orderBy('createdAt', 'asc'));
  onSnapshot(q, async (snapshot) => {
    questions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    if (questions.length === 0) {
      for (const sq of sampleQuestions) {
        await addDoc(collection(db, 'questions'), { ...sq, createdAt: serverTimestamp() });
      }
      return;
    }
    setSyncStatus('synced', '동기화됨');
    updateHome(); renderList(); renderSaved();
  }, () => { setSyncStatus('error', '오프라인'); });
}).catch(() => { setSyncStatus('error', '연결 실패'); });

window.switchTab = function(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['home','quiz','manage','saved'][i]===t));
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  if (t==='home') updateHome();
  if (t==='manage') renderList();
  if (t==='saved') renderSaved();
};
window.setMode = function(m) {
  mode = m;
  ['all','short','essay','calc','wrong','bookmarked'].forEach(k => { const el=document.getElementById('mode-'+k); if(el) el.classList.toggle('active',k===m); });
};
function updateHome() {
  document.getElementById('stat-total').textContent = questions.length;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-rate').textContent = totalAnswered ? Math.round(totalCorrect/totalAnswered*100)+'%' : '-';
}
window.startQuiz = function() {
  let pool = questions;
  if (mode==='short') pool=questions.filter(q=>q.type==='short');
  if (mode==='essay') pool=questions.filter(q=>q.type==='essay');
  if (mode==='calc') pool=questions.filter(q=>q.type==='calc');
  if (mode==='wrong') pool=questions.filter(q=>q.wrongCount>0);
  if (mode==='bookmarked') pool=questions.filter(q=>q.bookmarked);
  if (!pool.length) { alert('해당 유형의 문제가 없어요!'); return; }
  quizQueue=[...pool].sort(()=>Math.random()-0.5); quizIdx=0; answered=false;
  switchTab('quiz'); renderQuestion();
};
function typeBadge(type) {
  if(type==='short') return '<span class="badge badge-short">단답형</span>';
  if(type==='essay') return '<span class="badge badge-essay">서술형</span>';
  if(type==='calc') return '<span class="badge badge-calc">계산문제</span>';
  return '';
}
function renderQuestion() {
  if (quizIdx>=quizQueue.length) {
    document.getElementById('quiz-area').innerHTML=`<div class="q-card" style="text-align:center;padding:2rem 1rem"><div style="font-size:48px;margin-bottom:14px">🎉</div><div class="q-text">${quizQueue.length}문제 완료!</div><div style="font-size:14px;color:var(--text2);margin-top:8px">정답 ${totalCorrect}개 / 오답 ${totalAnswered-totalCorrect}개</div></div>`;
    document.getElementById('next-btn').style.display='none';
    document.getElementById('q-counter').textContent='';
    document.getElementById('progress-fill').style.width='100%';
    return;
  }
  answered=false; document.getElementById('next-btn').style.display='none';
  const q=quizQueue[quizIdx];
  document.getElementById('progress-fill').style.width=Math.round(quizIdx/quizQueue.length*100)+'%';
  document.getElementById('q-counter').textContent=(quizIdx+1)+' / '+quizQueue.length;
  let inputHtml='';
  if(q.type==='short') inputHtml=`<input type="text" id="ans-input" placeholder="단답으로 입력하세요"><button class="confirm-btn" onclick="checkAnswer()">확인</button>`;
  else if(q.type==='essay') inputHtml=`<textarea id="ans-input" placeholder="풀어서 서술해보세요..."></textarea><button class="confirm-btn" onclick="revealEssay()">모범답안 보기</button>`;
  else inputHtml=`${q.hint?`<div class="hint-box">💡 ${q.hint}</div>`:''}${q.unit?`<div class="unit-hint">단위: ${q.unit}</div>`:''}<input type="text" inputmode="decimal" id="ans-input" placeholder="계산 결과를 입력하세요"><button class="confirm-btn" onclick="checkAnswer()">확인</button>`;
  document.getElementById('quiz-area').innerHTML=`<div class="q-card"><div class="q-meta"><div>${typeBadge(q.type)}</div><button class="save-btn${q.bookmarked?' saved':''}" id="save-toggle" onclick="toggleBookmark('${q.id}')">${q.bookmarked?'⭐ 저장됨':'☆ 저장'}</button></div><div class="q-text">${q.q}</div>${q.type!=='calc'&&q.hint?`<div class="hint-box">💡 ${q.hint}</div>`:''}${inputHtml}<div id="feedback"></div></div>`;
  const inp=document.getElementById('ans-input');
  if(inp&&q.type!=='essay') setTimeout(()=>inp.focus(),150);
}
window.toggleBookmark = async function(id) {
  const q=questions.find(q=>q.id===id); if(!q) return;
  const nv=!q.bookmarked;
  await updateDoc(doc(db,'questions',id),{bookmarked:nv}).catch(()=>{});
  const btn=document.getElementById('save-toggle');
  if(btn){btn.textContent=nv?'⭐ 저장됨':'☆ 저장';btn.className=nv?'save-btn saved':'save-btn';}
  const cur=quizQueue[quizIdx]; if(cur&&cur.id===id) cur.bookmarked=nv;
};
window.checkAnswer = function() {
  if(answered) return;
  const q=quizQueue[quizIdx]; const inp=document.getElementById('ans-input');
  if(!inp||!inp.value.trim()) return;
  answered=true; todayCount++; totalAnswered++;
  let correct=false;
  if(q.type==='short') correct=inp.value.trim().toLowerCase()===q.answer.toLowerCase();
  else { const uv=parseFloat(inp.value.trim()),cv=parseFloat(q.answer); correct=!isNaN(uv)&&Math.abs(uv-cv)<0.01; }
  if(correct){totalCorrect++;}else{ const nc=(q.wrongCount||0)+1; updateDoc(doc(db,'questions',q.id),{wrongCount:nc}).catch(()=>{}); q.wrongCount=nc; }
  inp.disabled=true;
  document.getElementById('feedback').innerHTML=`<div class="feedback ${correct?'correct':'wrong'}">${correct?'정답입니다! ✓':'오답입니다. 정답: '+q.answer+(q.unit?' '+q.unit:'')}</div>`;
  document.getElementById('next-btn').style.display='block'; updateHome();
};
window.revealEssay = function() {
  if(answered) return;
  answered=true; todayCount++; totalAnswered++;
  const q=quizQueue[quizIdx]; const inp=document.getElementById('ans-input');
  if(inp) inp.disabled=true;
  document.getElementById('feedback').innerHTML=`<div class="feedback essay-reveal"><div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500">모범답안</div>${q.answer}</div><div class="self-btns"><button class="self-btn fail" onclick="markEssay(false)">❌ 틀렸어요</button><button class="self-btn ok" onclick="markEssay(true)">✓ 맞았어요</button></div>`;
};
window.markEssay = function(ok) {
  const q=quizQueue[quizIdx];
  if(ok){totalCorrect++;}else{const nc=(q.wrongCount||0)+1;updateDoc(doc(db,'questions',q.id),{wrongCount:nc}).catch(()=>{});q.wrongCount=nc;}
  const sb=document.querySelector('.self-btns'); if(sb) sb.style.display='none';
  document.getElementById('next-btn').style.display='block'; updateHome();
};
window.nextQuestion = function() { quizIdx++; renderQuestion(); };
window.setFilter = function(f) {
  listFilter=f;
  ['all','short','essay','calc','bookmarked'].forEach(k=>{const el=document.getElementById('filter-'+k);if(el)el.classList.toggle('active',k===f);});
  renderList();
};
window.toggleType = function() {
  const t=document.getElementById('q-type').value;
  document.getElementById('hint-row').style.display=(t==='essay'||t==='calc')?'block':'none';
  document.getElementById('unit-row').style.display=t==='calc'?'block':'none';
  const al=document.getElementById('ans-label'),at=document.getElementById('q-answer');
  if(t==='short'){al.textContent='정답';at.placeholder='정답을 입력하세요';at.style.minHeight='60px';}
  if(t==='essay'){al.textContent='모범답안';at.placeholder='모범답안을 입력하세요';at.style.minHeight='120px';}
  if(t==='calc'){al.textContent='정답 (숫자만)';at.placeholder='예: 8 (단위 제외)';at.style.minHeight='60px';}
};
window.addQuestion = async function() {
  const type=document.getElementById('q-type').value;
  const q=document.getElementById('q-question').value.trim();
  const ans=document.getElementById('q-answer').value.trim();
  const hint=(document.getElementById('q-hint')||{value:''}).value.trim();
  const unit=(document.getElementById('q-unit')||{value:''}).value.trim();
  if(!q){alert('문제를 입력해주세요');return;}
  if(!ans){alert('정답을 입력해주세요');return;}
  setSyncStatus('syncing','저장 중...');
  try {
    await addDoc(collection(db,'questions'),{type,q,answer:ans,hint,unit,wrongCount:0,bookmarked:false,createdAt:serverTimestamp()});
    setSyncStatus('synced','동기화됨');
    document.getElementById('q-question').value='';
    document.getElementById('q-answer').value='';
    const h=document.getElementById('q-hint');if(h)h.value='';
    const u=document.getElementById('q-unit');if(u)u.value='';
  } catch { setSyncStatus('error','저장 실패'); alert('저장 실패. 인터넷 연결을 확인해주세요.'); }
};
function renderList() {
  document.getElementById('q-count').textContent=questions.length;
  let pool=[...questions].reverse();
  if(listFilter==='short') pool=pool.filter(q=>q.type==='short');
  if(listFilter==='essay') pool=pool.filter(q=>q.type==='essay');
  if(listFilter==='calc') pool=pool.filter(q=>q.type==='calc');
  if(listFilter==='bookmarked') pool=pool.filter(q=>q.bookmarked);
  const el=document.getElementById('q-list');
  const tl={short:'단답형',essay:'서술형',calc:'계산문제'};
  if(!pool.length){el.innerHTML='<div class="empty">해당하는 문제가 없어요</div>';return;}
  el.innerHTML=pool.map(q=>`<div class="q-list-item${q.bookmarked?' bookmarked':''}"><div style="flex:1"><div class="q-list-text">${q.q}</div><div class="q-list-sub">${tl[q.type]} · 정답: ${q.answer}${q.unit?' '+q.unit:''} ${q.wrongCount?'· 오답 '+q.wrongCount+'회':''}</div></div><div class="q-list-actions"><button class="bk-btn${q.bookmarked?' on':''}" onclick="toggleBookmarkList('${q.id}')">${q.bookmarked?'⭐':'☆'}</button><button class="del-btn" onclick="deleteQ('${q.id}')">삭제</button></div></div>`).join('');
}
window.toggleBookmarkList = async function(id) {
  const q=questions.find(q=>q.id===id); if(!q) return;
  await updateDoc(doc(db,'questions',id),{bookmarked:!q.bookmarked}).catch(()=>{});
};
window.deleteQ = async function(id) {
  if(!confirm('이 문제를 삭제할까요?')) return;
  await deleteDoc(doc(db,'questions',id)).catch(()=>{});
};
function renderSaved() {
  const pool=questions.filter(q=>q.bookmarked);
  document.getElementById('saved-count').textContent=pool.length;
  const el=document.getElementById('saved-list');
  const tl={short:'단답형',essay:'서술형',calc:'계산문제'};
  if(!pool.length){el.innerHTML='<div class="empty">저장한 문제가 없어요<br><span style="font-size:12px">문제 풀기 중 ☆ 저장 버튼을 눌러보세요</span></div>';return;}
  el.innerHTML=pool.map(q=>`<div class="q-list-item bookmarked"><div style="flex:1"><div class="q-list-text">${q.q}</div><div class="q-list-sub">${tl[q.type]} · 정답: ${q.answer}${q.unit?' '+q.unit:''}</div></div><button class="bk-btn on" onclick="toggleBookmarkList('${q.id}')">⭐</button></div>`).join('');
}
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
</body>
